name: DevOps CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-quality:
    name: Pruebas y Control de Calidad Estricto
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Configurar Entorno de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar Dependencias del Microservicio
        run: npm install

      - name: Ejecutar Pruebas Unitarias y Cobertura
        run: |
          chmod +x ./node_modules/.bin/jest
          npm test 

      - name: Escaneo de Cumplimiento Normativo con SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Despliegue Continuo en AWS EC2
    runs-on: ubuntu-latest
    needs: test-and-quality 

    steps:
      - name: Desplegar en Instancia EC2 vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}         
          username: ubuntu                      
          key: ${{ secrets.EC2_SSH_KEY }}       
          script: |
            cd /home/ubuntu/Proyecto
            git pull origin main
            docker compose down
            docker compose up -d --build 
