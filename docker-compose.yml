version: '3.8'

services:
  node-app:
    build: .
    image: ghcr.io/bemontoya/nodejs-app:latest
    ports:
      - "3000:3000"
    restart: always 
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "us-east-1"
        awslogs-group: "node-app"
        awslogs-create-group: "true"